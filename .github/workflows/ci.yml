name: phase_3_CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Lint Python
      - name: Run pylint
        run: |
          pylint .

      # Lint Dockerfile
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      # Build Docker image
      - name: Build Docker image
        run: |
          docker build -t my-fastapi-app .

      # Run unit tests
      - name: Run tests
        run: |
          pytest
          
      - name: Push Docker image to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker tag my-fastapi-app:latest ${{ secrets.DOCKER_USERNAME }}/my-fastapi-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/my-fastapi-app:latest

      - name: test the docker image
        run: |
          docker run -d -p 8000:8000 ${{ secrets.DOCKER_USERNAME }}/my-fastapi-app:latest
          sleep 10
          VERSION=$(curl http://localhost:8000/version)
          echo $VERSION

          test "$VERSION" = "1.0.0"